<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja de Calças</title>

<!-- Fonte elegante -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #3b0a0a, #5a0f0f);
    margin: 0;
}

/* Texto de boas-vindas */
.welcome {
    text-align: center;
    color: white;
    margin-top: 60px;
    margin-bottom: 10px; /* corrigido */
    font-family: 'Playfair Display', serif;
}

.welcome span {
    display: block;
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.8;
}

.welcome h1 {
    margin: 5px 0;
    font-size: 34px;
    letter-spacing: 5px;
    font-weight: 700;
}

/* Menu */
.menu {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
}

.menu div {
    width: 25px;
    height: 3px;
    background: white;
    margin: 5px 0;
    border-radius: 2px;
}

/* Container */
.container {
    width: 340px;
    margin: 40px auto;
    padding: 30px;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

/* Título */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #3b0000;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    letter-spacing: 2px;
}

/* Seções */
.section-title {
    text-align: left;
    font-size: 13px;
    color: #5a0f0f;
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* Linha */
.divider {
    height: 1px;
    background: #eee;
    margin: 10px 0;
}

/* Form */
form {
    display: flex;
    flex-direction: column;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
    font-size: 14px;
}

/* Focus */
input:focus {
    border: 1px solid #5c0000;
    box-shadow: 0 0 6px rgba(92, 0, 0, 0.5);
}

/* Botão */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    background: linear-gradient(135deg, #5c0000, #7a0000);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

</style>

</head>
<body>

<!-- Menu -->
<div class="menu">
    <div></div>
    <div></div>
    <div></div>
</div>

<!-- ✅ AGORA CORRETO -->
<div class="welcome">
    <span>BEM-VINDO À</span>
    <h1>CLASS PANTS</h1>
</div>

<div class="container">
    <h2>Cadastro de Cliente</h2>

    <form action="cadastra.php" method="post">
    
        <div class="section-title">DADOS PESSOAIS</div>

        <input type="text" name="nome" placeholder="Nome" required>
        <input type="text" name="cpf" placeholder="CPF" required>

        <div class="divider"></div>

        <div class="section-title">ENDEREÇO</div>

        <input type="text" name="rua" placeholder="Rua" required>
        <input type="number" name="numero" placeholder="Número" required>
        <input type="text" name="bairro" placeholder="Bairro" required>
        <input type="text" name="cidade" placeholder="Cidade" required>
        <input type="text" name="estado" placeholder="Estado" required>
        <input type="number" name="cep" placeholder="CEP" required>
        <input type="text" name="complemento" placeholder="Complemento">

        <button type="submit">Cadastrar</button>
    </form>
</div>

</body>
</html>
